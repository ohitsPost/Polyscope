              <div className="sec-right">
                <div className="pills">{HM_WINS.map(p=><button key={p.v} className={`pill ${hotWin===p.v?"on":""}`} onClick={()=>setHotWin(p.v)}>{p.l}</button>)}</div>
                <button className={`btn ${hotLoad?"spin":""}`} onClick={()=>fetchHotMoney(hotWin)}>{hotLoad?"Loading…":"Scan Hot Money"}</button>
              </div>
            </div>
            <div className="notice notice-info">Tracks recent trades from top 15 Polymarket traders + Kalshi public feed. Load leaderboard first for best results.</div>
            {hotLoad&&Array(5).fill(0).map((_,i)=><div key={i} className="skel" style={{height:80,marginBottom:8,borderRadius:10}}/>)}
            {!hotLoad&&hotFetched&&!hotTrades.length&&<div className="wh-empty"><div className="wh-empty-icon">🔥</div><div className="wh-empty-msg">No trades found in this time window. Try a wider range or load leaderboard first.</div></div>}
            {!hotLoad&&!hotFetched&&<div className="wh-empty"><div className="wh-empty-icon">🔥</div><div className="wh-empty-msg">Click "Scan Hot Money" to find fast-moving capital</div></div>}
            {!hotLoad&&hotTrades.length>0&&(
              <div className="two-col">
                <div>
                  <div className="panel-hdr" style={{marginBottom:10}}>Volume Leaders</div>
                  {hotTrades.slice(0,15).map((h,i)=>{
                    const yesCount=h.directions.filter(d=>d==="YES").length;
                    const pctYes=h.directions.length?Math.round((yesCount/h.directions.length)*100):50;
                    return(
                      <div key={i} style={{background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:10,padding:"10px 14px",marginBottom:8}}>
                        <div style={{fontSize:11,fontWeight:600,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.market}</div>
                        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                          <span style={{fontFamily:"Space Mono,monospace",fontSize:9,color:"var(--gold)"}}>{fmt(h.volume)}</span>
                          <span style={{fontFamily:"Space Mono,monospace",fontSize:8,color:"var(--t3)"}}>{h.traders.length} trader{h.traders.length!==1?"s":""}</span>
                          <span style={{fontFamily:"Space Mono,monospace",fontSize:8,color:pctYes>=60?"var(--green)":pctYes<=40?"var(--red)":"var(--t3)"}}>{pctYes}% YES</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div>
                  <div className="panel-hdr" style={{marginBottom:10}}>Direction Consensus</div>
                  {hotTrades.filter(h=>h.traders.length>=2).slice(0,8).map((h,i)=>{
                    const yesCount=h.directions.filter(d=>d==="YES").length;
                    const pctYes=h.directions.length?Math.round((yesCount/h.directions.length)*100):50;
                    const bullish=pctYes>=60;
                    return(
                      <div key={i} style={{background:"var(--s1)",border:`1px solid ${bullish?"rgba(34,211,164,.15)":"rgba(244,63,94,.12)"}`,borderRadius:10,padding:"10px 14px",marginBottom:8}}>
                        <div style={{fontSize:10,fontWeight:600,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.market}</div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span className={`stag ${bullish?"stag-y":"stag-n"}`}>{bullish?"YES BIAS":"NO BIAS"}</span>
                          <span style={{fontFamily:"Space Mono,monospace",fontSize:8,color:"var(--t2)"}}>{h.traders.slice(0,3).join(", ")}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </>
        )}

        {/* ════ SCANNER ════ */}
        {tab==="scanner"&&(
          <>
            <div className="sec-head">
              <div><div className="sec-title">🔭 Scanner</div><div className="sec-sub">Edge scoring across all markets</div></div>
              <div className="sec-right">
                <div className="pills">{["both","poly","kalshi"].map(s=><button key={s} className={`pill ${mktSrc===s?"on":""}`} onClick={()=>setMktSrc(s)}>{s==="both"?"Both":s==="poly"?"Poly":"Kalshi"}</button>)}</div>
                <button className="btn" onClick={()=>{fetchPolyMkts();fetchKalshiMkts();}}>⟳</button>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              <input className="api-input" style={{maxWidth:260,padding:"7px 12px"}} placeholder="Search…" value={scanSearch} onChange={e=>setScanSearch(e.target.value)}/>
              <div className="pills">{CATS.map(c=><button key={c} className={`pill ${mktCat===c?"on":""}`} onClick={()=>setMktCat(c)}>{c}</button>)}</div>
            </div>
            <div className="scanner-tbl-wrap">
              <table className="scanner-tbl">
                <thead><tr><th>Market</th><th>Src</th><th>YES%</th><th>Volume</th><th>Edge Score</th><th>Trade</th><th>Save</th></tr></thead>
                <tbody>{scannerMkts.map((m,i)=>{
                  const edge=m._edge;
                  const edgeCls=edge>60?"en-hi":edge>35?"en-md":"en-lo";
                  const link=m._src==="kalshi"?`https://kalshi.com/markets/${m.ticker||""}`:`https://polymarket.com/event/${m.slug||m.conditionId||""}`;
                  return(
                    <tr key={m.id||i}>
                      <td><div className="sc-q">{m.question||m.title}</div></td>
                      <td><span className={`src-tag src-${m._src}`}>{m._src==="kalshi"?"K":"P"}</span></td>
                      <td style={{fontFamily:"Space Mono,monospace",color:"var(--cyan)"}}>{(m._yes*100).toFixed(0)}¢</td>
                      <td style={{fontFamily:"Space Mono,monospace",color:"var(--t2)"}}>{fmt(m._vol)}</td>
                      <td>
                        <div className="edge-wrap">
                          <div className="edge-bar"><div className="edge-fill" style={{width:`${edge}%`,background:edge>60?"var(--green)":edge>35?"var(--amber)":"var(--t3)"}}/></div>
                          <span className={`edge-n ${edgeCls}`}>{edge.toFixed(0)}</span>
                        </div>
                      </td>
                      <td><a href={link} target="_blank" rel="noopener" className="pick-link">↗</a></td>
                      <td><button className={`star-btn ${inWL(m)?"starred":""}`} onClick={()=>toggleWL(m)}>{inWL(m)?"★":"☆"}</button></td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </>
        )}

        {/* ════ AI AGENTS ════ */}
        {tab==="agents"&&(
          <>
            <div className="sec-head">
              <div><div className="sec-title">🤖 AI Agents</div><div className="sec-sub">4 models · Gemini · DeepSeek · Llama · Mistral · cross-verified picks</div></div>
              <div className="sec-right">
                {(savedPicks.length||picks.length)>0&&<button className="btn" onClick={()=>setShowReport(true)}>📄 Export Report</button>}
                <button className="btn-primary" onClick={runAgents} disabled={running}>{running?"⟳ Running…":"▶ Run Analysis"}</button>
              </div>
            </div>
            <div className="agents-layout">
              <div>
                <div className="roster">
                  <div className="roster-hdr">AGENT ROSTER</div>
                  {AGENTS.map(a=>(
                    <div key={a.id} className={`a-row ${agSt[a.id]==="thinking"?"a-active":""}`}>
                      <div className="a-em">{a.emoji}</div>
                      <div className="a-info"><div className="a-name">{a.name}</div><div className="a-role">{a.role}</div></div>
                      <div className={`a-dot ${agSt[a.id]||""}`}/>
                    </div>
                  ))}
                </div>
                <div className="how-box">
                  <div className="how-t">HOW IT WORKS</div>
                  Each agent runs on a different free AI model via OpenRouter, analyzes {Math.min(35,allMkts.length||35)} markets using only fundamental data (no market prices), then cross-references results. Markets 2+ agents agree on get higher conviction scores.
                </div>
              </div>
              <div>
                {logs.length>0&&(
                  <div className="abox" style={{marginBottom:12}}>
                    <div className="atbar"><span style={{fontFamily:"Space Mono,monospace",fontSize:8,color:"var(--cyan)"}}>LIVE LOG</span><span className="ast">{running?"RUNNING…":"COMPLETE"}</span></div>
                    <div className="alog" ref={logRef}>
                      {logs.map(l=>{
                        const agent=AGENTS.find(a=>a.id===l.agentId);
                        return(
                          <div key={l.id} className="le">
                            <span className={`ltag ${agent?agent.cls:"lg-sys"}`}>[{agent?agent.name:"SYS"}]</span>
                            {l.msg}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                {(savedPicks.length||picks.length)>0&&(
                  <div className="picks-section">
                    <div className="picks-hdr">
                      <div className="picks-title">Consensus Picks</div>
                      <div className="picks-meta">
                        <span className="pb pb-voted">{(savedPicks.length||picks.length)} PICKS</span>
                      </div>
                    </div>
                    <div className="picks-grid">
                      {(savedPicks.length?savedPicks:picks).map((p,i)=>{
                        const dc=p.direction==="YES"?"yes":p.direction==="NO"?"no":"abs";
                        const link=p.market?._src==="kalshi"?`https://kalshi.com/markets/${p.market?.ticker||""}`:`https://polymarket.com/event/${p.market?.slug||p.market?.conditionId||""}`;
                        return(
                          <div key={i} className="pick">
                            {p.smartMoney&&<div className="sm-mark">💎 SMART$</div>}
                            <div className="pick-n">PICK #{i+1} · {Math.round(p.votes)}/4 VOTES</div>
                            <div className="pick-q">{p.market?.question||p.market?.title||"—"}</div>
                            <div className="pick-direction">
                              <div className="pick-dir-label">DIRECTION</div>
                              <div className={`pick-dir-val ${dc}`}>{p.direction}</div>
                              {p.estProb&&<div className="pick-prob">{p.estProb}%</div>}
                            </div>
                            <div className="pick-r">{p.reasoning}</div>
                            <div className="pick-foot">
                              <div style={{display:"flex",gap:4}}>
                                {p.agents.map(id=>{const ag=AGENTS.find(a=>a.id===id);return ag?<span key={id} className={`ltag ${ag.cls}`} style={{fontSize:8}}>{ag.emoji}</span>:null;})}
                              </div>
                              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                <span className={`conf ${p.conf}`}>{p.conf==="H"?"HIGH":p.conf==="M"?"MED":"LOW"}</span>
                                <a href={link} target="_blank" rel="noopener" className="pick-link">↗ Trade</a>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                {!running&&!logs.length&&(
                  <div className="notice notice-info">
                    <strong>Ready</strong> — OpenRouter Free Models · Gemini 2.0 Flash · DeepSeek V3 · Llama 3.3 70B · Mistral 7B<br/>
                    {!apiKey&&<span style={{color:"var(--gold)"}}>Add your free OpenRouter key first — click "⚠ Add Key" in the header.</span>}
                  </div>
                )}
              </div>
            </div>
          </>
        )}

        {/* ════ WATCHLIST ════ */}
        {tab==="watchlist"&&(
          <>
            <div className="sec-head">
              <div><div className="sec-title">⭐ Watchlist</div><div className="sec-sub">{watchlist.length} markets saved</div></div>
              {watchlist.length>0&&<button className="btn" onClick={()=>{setWatchlist([]);localStorage.removeItem("ps_wl");}}>Clear All</button>}
            </div>
            {watchlist.length===0
              ?<div className="wl-empty"><div className="wl-empty-icon">⭐</div><div className="wl-empty-msg">No markets saved yet.<br/>Click ☆ on any market in Markets or Scanner to save it here.</div></div>
              :<div className="wl-grid">{watchlist.map((m,i)=>{
                const yes=parseFloat(m.outcomePrices?.[0]||m.lastTradePrice||m.yes_ask||0.5);
                const vol=getVol(m);
                const link=m._src==="kalshi"?`https://kalshi.com/markets/${m.ticker||""}`:`https://polymarket.com/event/${m.slug||m.conditionId||""}`;
                return(
                  <div key={i} className="wl-card">
                    <button className="wl-rm" onClick={()=>toggleWL(m)}>✕</button>
                    <div className="wl-q">{m.question||m.title}</div>
                    <div className="prob-bar"><div className="prob-fill" style={{width:`${yes*100}%`}}/></div>
                    <div className="prob-lbls"><span className="py">YES {(yes*100).toFixed(0)}¢</span><span className="pn">NO {((1-yes)*100).toFixed(0)}¢</span></div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
                      <span className="mkt-vol">Vol {fmt(vol)}</span>
                      <a href={link} target="_blank" rel="noopener" style={{fontFamily:"Space Mono,monospace",fontSize:8,color:"var(--cyan)",textDecoration:"none"}}>↗ Trade</a>
                    </div>
                    <div className="wl-added">Added {m._wlAdded}</div>
                  </div>
                );
              })}</div>
            }
          </>
        )}

      </div>{/* end .main */}

      {/* ── TOASTS ── */}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className="toast">
            <span className="toast-icon">{t.icon}</span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
